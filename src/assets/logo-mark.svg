<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ent-a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="ent-b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <radialGradient id="ent-glow">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Entangled orbit A -->
  <ellipse cx="256" cy="256" rx="200" ry="100"
           fill="none" stroke="url(#ent-a)" stroke-width="36"
           transform="rotate(-25 256 256)"/>

  <!-- Entangled orbit B -->
  <ellipse cx="256" cy="256" rx="200" ry="100"
           fill="none" stroke="url(#ent-b)" stroke-width="36"
           transform="rotate(65 256 256)"/>

  <!-- Third orbit hint -->
  <ellipse cx="256" cy="256" rx="170" ry="60"
           fill="none" stroke="#0D9488" stroke-width="12" opacity="0.4"
           transform="rotate(20 256 256)"/>

  <!-- Entanglement nodes -->
  <circle cx="110" cy="170" r="22" fill="#0D9488"/>
  <circle cx="402" cy="342" r="22" fill="#0D9488"/>

  <!-- Connection line -->
  <line x1="110" y1="170" x2="402" y2="342"
        stroke="#14B8A6" stroke-width="4" opacity="0.4" stroke-dasharray="8 5"/>

  <!-- Central flare -->
  <circle cx="256" cy="256" r="64" fill="url(#ent-glow)"/>
  <circle cx="256" cy="256" r="32" fill="#14B8A6"/>
  <circle cx="256" cy="256" r="12" fill="#FFFFFF" opacity="0.8"/>
</svg>
