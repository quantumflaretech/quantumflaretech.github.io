<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ent-a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="ent-b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <radialGradient id="ent-glow">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#1A1A2E"/>

  <!-- Entangled orbit A — wide horizontal ellipse -->
  <ellipse cx="256" cy="256" rx="160" ry="80"
           fill="none" stroke="url(#ent-a)" stroke-width="14" opacity="0.35"
           transform="rotate(-25 256 256)"/>

  <!-- Entangled orbit B — wide horizontal ellipse, perpendicular -->
  <ellipse cx="256" cy="256" rx="160" ry="80"
           fill="none" stroke="url(#ent-b)" stroke-width="14" opacity="0.35"
           transform="rotate(65 256 256)"/>

  <!-- Third orbit hint — adds depth -->
  <ellipse cx="256" cy="256" rx="140" ry="52"
           fill="none" stroke="#0D9488" stroke-width="4" opacity="0.08"
           transform="rotate(20 256 256)"/>

  <!-- Entanglement nodes — particles on orbits -->
  <circle cx="136" cy="188" r="10" fill="#0D9488" opacity="0.4"/>
  <circle cx="376" cy="324" r="10" fill="#0D9488" opacity="0.4"/>

  <!-- Connection line between entangled particles -->
  <line x1="136" y1="188" x2="376" y2="324"
        stroke="#14B8A6" stroke-width="1.5" opacity="0.1" stroke-dasharray="6 4"/>

  <!-- Central convergence — the flare -->
  <circle cx="256" cy="256" r="48" fill="url(#ent-glow)"/>
  <circle cx="256" cy="256" r="20" fill="#14B8A6"/>
  <circle cx="256" cy="256" r="7" fill="#FFFFFF" opacity="0.35"/>
</svg>
